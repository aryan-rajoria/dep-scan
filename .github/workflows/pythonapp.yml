name: Python matrix CI

on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build:
    env:
      VDB_DATABASE_URL: "ghcr.io/appthreat/vdbxz-app-2y:v6.7.x"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Use Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
      with:
        node-version: '24.x'
        package-manager-cache: false
    - name: Set up JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Install dependencies
      run: |
        uv sync --all-extras --all-packages --dev
        npm install -g @cyclonedx/cdxgen
    - name: Test with pytest
      run: |
        # Run the top-level depscan tests and the analysis-lib tests (the
        # latter includes the CSAF VEX generate-and-validate suite).
        uv run pytest --cov=depscan test packages/analysis-lib/tests
        uv run depscan --config .config/depscan-dev.toml
      env:
        SCAN_DEBUG_MODE: debug
    - name: purl tests
      run: |
        uv run depscan --purl "pkg:pypi/requests@2.32.1"
        uv run depscan --purl "pkg:pypi/requests@4.0.0"
        uv run depscan --purl "pkg:pypi/reqwestss@0.1.0"
        uv run depscan --purl "pkg:npm/%40appthreat/cdxgen@7.0.5"
        uv run depscan --purl "pkg:npm/%40appthreat/cdxgen@7.1.0"
        uv run depscan --purl "pkg:npm/fsevents@1.2.10"
        uv run depscan --purl "pkg:npm/@biomejs/biome@1.8.1"
      env:
        PYTHONIOENCODING: utf-8
    - name: Custom data tests
      run: |
        mkdir -p custom_vulns
        cat > custom_vulns/private.yaml <<EOF
        dataType: CVE_RECORD
        dataVersion: "5.2"
        cveMetadata:
          cveId: PRIVATE-DEPSCAN-TEST
          assignerOrgId: 00000000-0000-4000-8000-000000000000
          state: PUBLISHED
          datePublished: "2024-01-01T00:00:00Z"
          dateUpdated: "2024-01-01T00:00:00Z"
        containers:
          cna:
            providerMetadata:
              orgId: 00000000-0000-4000-8000-000000000000
            descriptions:
              - lang: en
                value: "Depscan Test Vulnerability"
            affected:
              - vendor: internal
                product: custom-test
                packageName: custom-test
                packageURL: pkg:pypi/custom-test
                versions:
                  - version: "1.0.0"
                    status: affected
                    versionType: semver
        EOF

        uv run depscan --purl "pkg:pypi/custom-test@1.0.0" --custom-data custom_vulns
      if: ${{ matrix.os == 'ubuntu-latest' }}
      env:
        PYTHONIOENCODING: utf-8
