name: Upload depscan Package and Container image

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    paths-ignore:
      - '**/README.md'
      - 'dockertests.yml'
      - 'pythonapp.yml'
      - 'gobintests.yml'
    branches:
      - master
      - release/*
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NYDUS_VERSION: v2.3.1
  NYDUS_STATIC_AMD64_SHA256: bd0cac0785572b2d8af1b4f97f9272713356fbc0c8e0770b23cfc8ea0e3920ae

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.x'
          package-manager-cache: false
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Build
        run: |
          uv build --all-packages
          ls -lh dist
      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv publish --trusted-publishing always

  build-images:
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: default-amd64
            arch: amd64
            dockerfile: Dockerfile
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: default-arm64
            arch: arm64
            runner-suffix: -arm
            dockerfile: Dockerfile
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: al9-amd64
            arch: amd64
            dockerfile: Dockerfile.al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
          - id: al9-arm64
            arch: arm64
            runner-suffix: -arm
            dockerfile: Dockerfile.al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
    runs-on: ubuntu-24.04${{ matrix.image.runner-suffix }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ matrix.image.images }}
          flavor: latest=false,suffix=-${{ matrix.image.arch }}
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.image.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=depscan
          cache-to: type=gha,mode=max,scope=depscan

  deploy-manifest:
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: default
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        id: metadata
        with:
          images: ${{ matrix.image.images }}
      - name: Define Sources
        id: sources
        run: |
          FIRST_TAG=$(echo "${STEPS_METADATA_OUTPUTS_TAGS}" | head -n 1)
          echo "amd64_source=${FIRST_TAG}-amd64" >> $GITHUB_OUTPUT
          echo "arm64_source=${FIRST_TAG}-arm64" >> $GITHUB_OUTPUT
        env:
          STEPS_METADATA_OUTPUTS_TAGS: ${{ steps.metadata.outputs.tags }}
      - uses: int128/docker-manifest-create-action@a0bcb6430fe0047c0558deab102a6c66c373dae2  # v2.25.0
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          sources: |
            ${{ steps.sources.outputs.amd64_source }}
            ${{ steps.sources.outputs.arm64_source }}

  post-process:
    needs: [deploy-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.x'
          package-manager-cache: false
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d  # v2.0.1
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM with cdxgen
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t python -o bom.json . --profile research
          cdxgen -t docker -o depscan-oci-image.cdx.json ghcr.io/owasp-dep-scan/depscan:latest
      - name: Attach sbom to the image
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        run: |
          oras attach --artifact-type sbom/cyclonedx ghcr.io/owasp-dep-scan/depscan:latest ./depscan-oci-image.cdx.json:application/json
          oras discover --format tree ghcr.io/owasp-dep-scan/depscan:latest
      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: |
            bom.json
            depscan-oci-image.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup nydus
        run: |
          NYDUS_ARCHIVE="nydus-static-${NYDUS_VERSION}-linux-amd64.tgz"
          curl -LO "https://github.com/dragonflyoss/nydus/releases/download/${NYDUS_VERSION}/${NYDUS_ARCHIVE}"
          echo "${NYDUS_STATIC_AMD64_SHA256}  ${NYDUS_ARCHIVE}" | sha256sum -c -
          tar -xvf "${NYDUS_ARCHIVE}"
          chmod +x nydus-static/*
          mv nydus-static/* /usr/local/bin/
          rm -rf "${NYDUS_ARCHIVE}" nydus-static
      - name: nydusify
        run: |
          nydusify convert --oci --oci-ref --source ghcr.io/owasp-dep-scan/depscan:master --target ghcr.io/owasp-dep-scan/depscan:master-nydus --prefetch-dir /opt/dep-scan
          nydusify check --target ghcr.io/owasp-dep-scan/depscan:master-nydus
          nydusify convert --oci --oci-ref --source ghcr.io/owasp-dep-scan/dep-scan:master --target ghcr.io/owasp-dep-scan/dep-scan:master-nydus --prefetch-dir /opt/dep-scan
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
