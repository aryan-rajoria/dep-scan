depscan_version = "4.3.1"

[document]
category = "csaf_vex"
title = "Your Title"

[publisher]
# Required
# Valid categories are: coordinator, discoverer, other, translator, user, vendor
category = "vendor"
name = "Vendor McVendorson"
namespace = "https://appthreat.com"
# Optional
contact_details = "vendor@mcvendorson.com"

# Category and text are required to add a note, add as many [[note]] as you need.
# Valid categories are: description, details, faq, general, legal_disclaimer, other, summary
# Notes without text are dropped (CSAF requires non-empty note text).
[[note]]
audience = ""
category = ""
text = ""
title = ""

[distribution]
text = ""
# Label is required if tlp included
label = ""
url = ""

# Summary and url are required, include as many [[reference]] as you like.
# Category can be either "external" or "self"
[[reference]]
category = ""
summary = ""
url = ""

[[reference]]
category = ""
summary = ""
url = ""

# The product_tree is built automatically from the CycloneDX BOM components
# (every component purl becomes a product_id), so no manual import is needed.

# id is best set by the document issuing authority; dep-scan generates one
# from the date and version when left blank.
[tracking]
current_release_date = ""   # ISO 8601; defaults to now
id = ""
initial_release_date = ""   # ISO 8601; defaults to now
status = "draft"
version = ""                # defaults to the latest revision number

# revision_history is always non-empty (CSAF requires >=1 entry).
# Add entries to track document history; dep-scan seeds the initial entry.
[[tracking.revision_history]]
date = ""
number = ""
summary = ""
